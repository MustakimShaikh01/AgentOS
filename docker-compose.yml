version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AgentOS — Stage 1: Modular Monolith
#
# This is the ONLY docker-compose you need for Stage 1.
# One command: docker-compose up -d
#
# Services:
#   postgres   — primary data store
#   redis      — JWT blacklist, rate limiting, short-term memory
#   litellm    — LLM gateway (all model calls go here)
#
# What is NOT here (intentionally):
#   - Kafka        (Capability 6)
#   - Neo4j        (Capability 2+)
#   - Elasticsearch (Stage 3+)
#   - Multiple API services (Stage 2+)
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: agentos-postgres
    environment:
      POSTGRES_DB: agentos
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentos-redis
    command: redis-server --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: agentos-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./infra/docker/litellm.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
